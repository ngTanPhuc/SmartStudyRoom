services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smart-study-room-backend
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      PORT: 8080
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/smart_study_room?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-smart_room}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-smart_room_password}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JWT_SIGNERKEY: ${JWT_SIGNERKEY:-6ccda8decc38127a1a2d7b5665c6835645ea8db3900e4c3459698eb0b60f3313}
      JWT_VALID_DURATION: ${JWT_VALID_DURATION:-36000}
      JWT_REFRESHABLE_DURATION: ${JWT_REFRESHABLE_DURATION:-360000}
      JAVA_OPTS: ${JAVA_OPTS:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    container_name: smart-study-room-mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_DATABASE: smart_study_room
      MYSQL_USER: ${MYSQL_USER:-smart_room}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-smart_room_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    volumes:
      - smart-study-room-mysql-data:/var/lib/mysql
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -u root -p"$${MYSQL_ROOT_PASSWORD}" --silent
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  smart-study-room-mysql-data:
