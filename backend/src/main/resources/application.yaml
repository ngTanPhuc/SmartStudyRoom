server:
  port: ${SERVER_PORT:8080}

spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:backend/.env[.properties]
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/smart_study_room}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}

jwt:
  signerKey: ${JWT_SIGNER_KEY:dev-only-change-me-dev-only-change-me-dev-only-1234567890}
  valid-duration: ${JWT_VALID_DURATION:36000} # seconds
  refreshable-duration: ${JWT_REFRESHABLE_DURATION:360000} # seconds

ai-service:
  base-url: ${AI_SERVICE_BASE_URL:http://localhost:8000}
  timeout-seconds: ${AI_SERVICE_TIMEOUT_SECONDS:2}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
